# CI: host-test the routing core, build the three release boards, package UF2s.
# On a v* tag, attach the UF2s to a GitHub release; on pushes to main, publish the
# web commissioning hub (web/) to GitHub Pages with the firmware staged same-origin.
# The RAK4631 board def and the XIAO/promicro variants are vendored in-repo (boards/,
# variants/), so a stock PlatformIO install builds everything with no extra setup.
name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write   # needed by the release step on tag builds

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Host tests (portable routing core, 44 tests)
        run: pio test -e native

      - name: Build firmware (RAK4631 + XIAO nRF52840)
        run: pio run -e wiscore_rak4631 -e xiao_nrf52 -e promicro

      - name: Package UF2s
        run: |
          UF2CONV=$(find ~/.platformio/packages -name uf2conv.py | head -1)
          python "$UF2CONV" .pio/build/wiscore_rak4631/firmware.hex -c -f 0xADA52840 -o agn-rak.uf2
          python "$UF2CONV" .pio/build/xiao_nrf52/firmware.hex     -c -f 0xADA52840 -o agn-xiao.uf2
          python "$UF2CONV" .pio/build/promicro/firmware.hex       -c -f 0xADA52840 -o agn-promicro.uf2
          ls -la agn-rak.uf2 agn-xiao.uf2 agn-promicro.uf2

      - name: Package DFU JSON (for the in-browser web flasher)
        run: |
          python scripts/mk_dfu_json.py .pio/build/wiscore_rak4631/firmware.zip agn-rak.dfu.json
          python scripts/mk_dfu_json.py .pio/build/xiao_nrf52/firmware.zip      agn-xiao.dfu.json
          python scripts/mk_dfu_json.py .pio/build/promicro/firmware.zip        agn-promicro.dfu.json

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: |
            agn-rak.uf2
            agn-xiao.uf2
            agn-promicro.uf2
            agn-rak.dfu.json
            agn-xiao.dfu.json
            agn-promicro.dfu.json

      - name: Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agn-rak.uf2
            agn-xiao.uf2
            agn-promicro.uf2
            agn-rak.dfu.json
            agn-xiao.dfu.json
            agn-promicro.dfu.json
          generate_release_notes: true

  # Publish the web commissioning hub (web/) to GitHub Pages, with the freshly built
  # firmware staged into web/fw/ so the in-browser flasher fetches it SAME-ORIGIN (no
  # cross-origin/CORS dependency on release downloads). Reuses the firmware-uf2 artifact
  # from the build job above — no rebuild. Runs only on pushes to main.
  #
  # One-time setup (after the repo is public): Settings → Pages → Build and deployment →
  # Source = "GitHub Actions". Pages on the free tier requires a PUBLIC repo, so this job
  # will not succeed while the repo is private.
  deploy-pages:
    needs: firmware
    # Skips cleanly while the repo is private (Pages needs a public repo); auto-activates on the flip.
    if: github.ref == 'refs/heads/main' && github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Stage firmware into web/fw/
        uses: actions/download-artifact@v4
        with:
          name: firmware-uf2
          path: web/fw

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web            # site root = web/, so the hub is index.html and ./fw/ is same-origin
      - id: deploy
        uses: actions/deploy-pages@v4
