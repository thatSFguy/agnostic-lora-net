; LoRa Mesh Backbone — Phase 0 scaffold
; See README.md for the full project plan. Phase 0 goal: an interrupt-driven
; (never-blocking) SX1262 link between two RAK4631 nodes that prints RSSI/SNR.
;
; Two environments:
;   [env:wiscore_rak4631]  -> the REAL flashing target (RAK4631, nRF52840+SX1262).
;                             Requires the RAK4631 board variant in the Adafruit
;                             nRF52 core (shipped by the RAKwireless BSP that the
;                             forked MeshCore pins in [nrf52_base]).
;   [env:compile_check]    -> identical MCU/core/toolchain (Adafruit Feather
;                             nRF52840) used to compile-verify this firmware on a
;                             host that doesn't yet have the RAK variant installed.
;                             Same code, same SoftDevice (s140 6.1.1), same RadioLib.
;
; The radio wiring lives in include/board_config.h as explicit nRF52840 GPIOs, so
; the firmware logic is board-variant independent.

[platformio]
default_envs = compile_check
boards_dir = boards

; Applies to EVERY environment: stamp AGN_FW_VERSION from git at build time so no build
; is ever version-ambiguous again (tagged -> 0.12.0; ahead -> 0.12.0-N-gSHA; uncommitted
; -> -dirty). See scripts/git_version.py.
[env]
extra_scripts = pre:scripts/git_version.py

[common]
framework = arduino
; Pinned so PHY/firmware behaviour is reproducible. RadioLib covers SX1262 + SX1276
; from one API.
lib_deps =
    jgromes/RadioLib @ ^7.1.0
; Flags shared by every board, BLE aside (BLE is nRF52-only — see build_flags).
base_flags =
    ; AGN_FW_VERSION is NOT hardcoded — scripts/git_version.py stamps it from `git
    ; describe` (wired via the global [env] extra_scripts above). Cut a release by
    ; bumping the tag; see scripts/release.sh.
    ; Set per node before flashing, or leave 0 to auto-derive a provisional ID
    ; from the chip's FICR DEVICEID / ESP32 eFuse MAC (placeholder for the
    ; pubkey-derived ID, §3).
    -DAGN_NODE_ID=0
build_flags =
    ${common.base_flags}
    ; BLE (Nordic UART Service) is compiled into every nRF52 board build so that
    ; firmware is uniform. It is OFF by default and the SoftDevice is enabled lazily
    ; (only on the first `ble on`), so a node that never uses BLE pays no runtime/power
    ; cost — just the flash it occupies. The ESP32 (Heltec V4) build leaves it out for
    ; now; that node's console is over USB serial. Turn it on from the console / web.
    -DAGN_BLE
monitor_speed = 115200
monitor_filters = time, send_on_enter

[env:wiscore_rak4631]
platform = nordicnrf52
board = wiscore_rak4631
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DAGN_BOARD_RAK4631
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_protocol = nrfutil

[env:compile_check]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DAGN_COMPILE_CHECK=1
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}

; Seeed XIAO nRF52840 + Wio-SX1262 (third node). SX1262, 1.8 V TCXO, RXEN RF switch.
; Pin map vendored in variants/xiao_nrf52 (from MeshCore). See docs/hardware-bringup.md.
[env:xiao_nrf52]
platform = nordicnrf52
board = xiao_nrf52
framework = ${common.framework}
; XIAO nRF52840 ships with SoftDevice s140 v7.3.0 — app must link at 0x27000, not
; v6's 0x26000, or the bootloader rejects the DFU package / the app won't boot.
board_build.ldscript = boards/nrf52840_s140_v7.ld
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DAGN_BOARD_XIAO
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_protocol = nrfutil

; Pro Micro nRF52840 ("faketec") + SX1262. SX1262, 1.8 V TCXO, RXEN + power-enable.
; Pin map vendored in variants/promicro (from MeshCore).
[env:promicro]
platform = nordicnrf52
board = promicro_nrf52840
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DAGN_BOARD_PROMICRO
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_protocol = nrfutil

; Seeed SenseCAP T1000-E — nRF52840 + Semtech LR1110 (not SX1262). Same nRF52 data
; plane / BLE / persistence as the other nodes; only the radio chip differs (the HAL
; selects RadioLib's LR1110 class via AGN_RADIO_LR1110 in board_config.h). Ships with
; SoftDevice s140 v7.3.0 -> link at 0x27000 (same v7 ldscript as the XIAO). Board +
; variant vendored in boards/tracker_t1000_e.json and variants/tracker_t1000_e.
[env:tracker_t1000_e]
platform = nordicnrf52
board = tracker_t1000_e
framework = ${common.framework}
board_build.ldscript = boards/nrf52840_s140_v7.ld
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DAGN_BOARD_T1000
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_protocol = nrfutil

; Heltec WiFi LoRa 32 V4 — ESP32-S3 + SX1262 behind a GC1109/KCT8103L front-end
; module. A different MCU family: no SoftDevice (BLE left out for now — console is
; over USB serial), persistence on the ESP32 LittleFS (include/fs_compat.h), node ID
; folded from the eFuse MAC. Board def vendored in boards/heltec_v4.json; the FEM/VEXT
; control lives in radio_hal.cpp + board_config.h (verify on first flash). Flash with
; `pio run -e heltec_v4 -t upload` over USB serial (esptool); no UF2/DFU.
[env:heltec_v4]
platform = espressif32
board = heltec_v4
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.base_flags}
    -DAGN_BOARD_HELTEC_V4
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}

; Seeed XIAO ESP32-S3 + the Wio-SX1262 expansion (Meshtastic: "Seeed Xiao ESP32-S3"). ESP32-S3
; like the Heltec, SX1262 radio on the lower GPIO bank (board_config.h, pins from Meshtastic's
; variant). base_flags (no Bluefruit BLE; console over native USB). The XIAO ESP32-S3 carries
; OCTAL (OPI) PSRAM, but the stock board enables BOARD_HAS_PSRAM with the default QUAD driver,
; which crashes early boot on this hardware — force qio_opi to match the silicon (as Meshtastic
; does). NOT bench-validated yet.
[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = ${common.framework}
board_build.arduino.memory_type = qio_opi
lib_deps = ${common.lib_deps}
build_flags =
    ${common.base_flags}
    -DAGN_BOARD_XIAO_S3
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}

; Host env: unit-test the routing core (lib/mesh) on the dev machine, with no
; hardware and no Arduino/RadioLib. The mesh library is pure portable C++, so the
; exact same logic that runs on the nRF52 is exercised here. `pio test -e native`.
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -Wall -Iinclude
test_build_src = no
