<!DOCTYPE html>
<!-- map.html — mesh map & node management (Phase A).

     Connect ONE gateway node (Web Serial on the bench, Web Bluetooth in the field).
     The app polls `info` (5 s) + `nbrdump` (15 s): the gateway's own tables plus the
     announce-derived view of every neighbour's links — the passive 1-hop topology.
     Nodes are placed on a Leaflet map (positions in localStorage + JSON export);
     links render as per-direction arrows colored by quality, with asymmetry badges
     and SNR-margin popups. Battery panel includes `batt cal` single-point calibration.

     fw >= 0.6.0 (nbrdump / batt verbs). Serve over http://localhost (Web Serial/BT
     need a secure context):  python3 -m http.server 8000  ->  /web/map.html        -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>AgnLoRa mesh map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --bg:#10151c; --panel:#1a212b; --line:#2b3645; --fg:#dfe7f1; --dim:#8a97a8;
          --ok:#3fb950; --warn:#d29922; --bad:#f85149; --acc:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 system-ui,sans-serif; background:var(--bg); color:var(--fg);
         display:grid; grid-template-columns:300px 1fr 340px; grid-template-rows:48px 1fr; height:100vh; }
  header { grid-column:1/4; display:flex; align-items:center; gap:10px; padding:0 12px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0 12px 0 0; }
  button { background:#21304a; color:var(--fg); border:1px solid var(--line); border-radius:6px;
           padding:5px 10px; cursor:pointer; font-size:13px; }
  button:hover { background:#2a3d5e; } button:disabled { opacity:.4; cursor:default; }
  .pill { padding:2px 8px; border-radius:10px; font-size:12px; background:#26303d; color:var(--dim); }
  .pill.ok { color:var(--ok); } .pill.bad { color:var(--bad); }
  #left  { background:var(--panel); border-right:1px solid var(--line); overflow:auto; padding:10px; }
  #map   { background:#0a0e13; }
  #right { background:var(--panel); border-left:1px solid var(--line); overflow:auto; padding:10px; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin:14px 0 6px; }
  .node-row { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; }
  .node-row:hover { background:#222c39; } .node-row.sel { background:#23344f; }
  .dot { width:10px; height:10px; border-radius:50%; flex:none; }
  .mono { font-family:ui-monospace,monospace; font-size:12.5px; }
  .kv { display:grid; grid-template-columns:auto 1fr; gap:2px 10px; font-size:12.5px; }
  .kv div:nth-child(odd) { color:var(--dim); }
  input[type=text],input[type=number] { background:#0f1722; color:var(--fg); border:1px solid var(--line);
           border-radius:6px; padding:5px 8px; width:100%; font-size:13px; }
  #log { font-family:ui-monospace,monospace; font-size:11px; color:var(--dim); white-space:pre-wrap;
         max-height:160px; overflow:auto; background:#0d131b; border-radius:6px; padding:6px; }
  .linkrow { padding:4px 6px; border-radius:5px; font-size:12.5px; cursor:pointer; }
  .linkrow:hover { background:#222c39; }
  .nodelabel { display:inline-flex; align-items:center; gap:5px; background:#0d1622f2;
               border:2px solid #555; border-radius:999px; padding:3px 11px;
               font:700 12.5px ui-monospace,monospace; color:#fff; white-space:nowrap;
               box-shadow:0 2px 8px #000a; text-shadow:0 1px 2px #000; }
  .nodelabel small { font-weight:500; color:#bcd2ea; }
  .nodelabel .gw { color:var(--acc); }
  .leaflet-container { background:#0a0e13; }
  .hint { font-size:12px; color:var(--dim); }
  .asym-badge { font-size:14px; text-shadow:0 0 3px #000; }
</style>
</head>
<body>
<header>
  <h1>AgnLoRa mesh map</h1>
  <button id="btnSerial">Connect gateway (Serial)</button>
  <button id="btnBle">Connect gateway (BLE)</button>
  <span id="gwPill" class="pill">no gateway</span>
  <span style="flex:1"></span>
  <button id="btnExport" title="Backup: positions + controller key (the key is secret!)">Export backup</button>
  <button id="btnImport" title="Restore positions + controller key from a backup file">Import</button>
  <input type="file" id="impFile" accept=".json" style="display:none">
</header>

<div id="left">
  <h2>Nodes</h2>
  <div id="nodeList"></div>
  <div class="hint" id="placeHint" style="display:none">Click the map to place <b id="placeId"></b> — Esc to cancel.</div>
  <h2>Mesh health</h2>
  <div id="healthList" class="mono"></div>
  <h2>Gateway console <label style="font-weight:400;text-transform:none;letter-spacing:0">
  <input type="checkbox" id="verbose"> verbose</label></h2>
  <div id="log"></div>
  <div style="display:flex; gap:6px; margin-top:6px;">
    <input type="text" id="cmd" placeholder="console command…" disabled>
    <button id="cmdSend" disabled>Send</button>
  </div>
</div>

<div id="map"></div>

<div id="right">
  <h2>Selected node</h2>
  <div id="detail" class="hint">Click a node on the map or in the list.</div>
</div>

<script>
'use strict';
// ---------- constants ----------
// Generic default view until nodes are placed; the map fits to your placed positions.
const DEFAULT_CENTER = [39.5, -98.35], ZOOM = 4;
const ASYM_THRESHOLD = 0.35;                       // mirrors lib/mesh ASYM_THRESHOLD
const SNR_LIMIT = {5:-2.5, 6:-5, 7:-7.5, 8:-10, 9:-12.5, 10:-15, 11:-17.5, 12:-20};
// Marker freshness scales with the network's beacon cadence (fw `net beacon`,
// auto-by-SF by default): stale after ~3 missed beacons, lost after ~9.
const BEACON_AUTO = {5:10,6:10,7:10,8:15,9:25,10:40,11:75,12:140};   // seconds, mirrors fw
let beaconSec = 10;
const STALE_MS = () => beaconSec * 3000, LOST_MS = () => beaconSec * 9000;
const NUS='6e400001-b5a3-f393-e0a9-e50e24dcca9e',
      NUS_RX='6e400002-b5a3-f393-e0a9-e50e24dcca9e',   // we write here
      NUS_TX='6e400003-b5a3-f393-e0a9-e50e24dcca9e';   // node notifies here

// ---------- state ----------
// nodes: id -> { lastSeen, fw, vitals:{}, batt:{mv,pct}, sf, power,
//                hears: {fromId: {q, rssi, snr, age, src}},  // directed: fromId -> this node
//                routes: [{dst, via, cost, hops}], isGateway }
const nodes = new Map();
// Ids the connected gateway is currently blocking (authoritative — rebuilt from the
// gateway's `[blocked]` line each info poll). A blocked link is gateway -> id.
let blocked = new Set();
let gatewayId = null, selected = null, placing = null;
const positions = JSON.parse(localStorage.getItem('agn-node-pos') || '{}');
const aliases = JSON.parse(localStorage.getItem('agn-node-alias') || '{}');   // id -> manual override
function saveAlias() { localStorage.setItem('agn-node-alias', JSON.stringify(aliases)); }
const names = {};                                           // id -> the node's own friendly name (live, from info/[status])
const shortId = id => id.slice(-4);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const given = id => aliases[id] || names[id] || null;       // a GIVEN name: manual override, else the node's own name
const nodeName = id => given(id) || shortId(id);            // given name if any, else the hash (last-4) as fallback

const $ = id => document.getElementById(id);
function node(id) {
  if (!nodes.has(id)) nodes.set(id, { id, lastSeen:0, fw:'', vitals:{}, batt:null, sf:null,
                                      power:null, hears:{}, routes:[], isGateway:false });
  return nodes.get(id);
}

// ---------- gateway transport (Serial or BLE), text-line demux ----------
// The NUS/serial stream interleaves console text with HDLC tunnel frames (0x7E…0x7E).
// Frame bytes are discarded; text bytes accumulate into lines.
let gw = null;          // {sendLine(s), close()}
let inFrame = false, lineBuf = '';
function feedBytes(bytes) {
  for (const b of bytes) {
    if (b === 0x7E) { inFrame = !inFrame; continue; }
    if (inFrame) continue;
    if (b === 0x0D) continue;
    if (b === 0x0A) { onLine(lineBuf); lineBuf = ''; }
    else if (lineBuf.length < 300) lineBuf += String.fromCharCode(b);
  }
}
const NOISY = /^(\[hb\]|\[ble\]|\[RX\]|\[TX\]|\[rf\]|nbr |route |node |fw |cad |batt mv|\[nbrs\]|\[dir\]|\[batt\]|\[status\]|status query)/;
function logLine(s) {
  if (!$('verbose').checked && NOISY.test(s.trim())) return;
  const el = $('log');
  el.textContent = (el.textContent + s + '\n').split('\n').slice(-120).join('\n');
  el.scrollTop = el.scrollHeight;
}

async function connectSerial() {
  const port = await navigator.serial.requestPort();
  await port.open({ baudRate: 115200 });
  const writer = port.writable.getWriter();
  (async () => {
    const reader = port.readable.getReader();
    try { for (;;) { const {value, done} = await reader.read(); if (done) break; feedBytes(value); } }
    catch (e) { logLine('serial: ' + e); } finally { gwDown(); }
  })();
  gw = { sendLine: async s => writer.write(new TextEncoder().encode(s + '\n')),
         close: () => port.close().catch(()=>{}) };
  gwUp('serial');
}

async function connectBle() {
  const dev = await navigator.bluetooth.requestDevice({ filters:[{namePrefix:'ALN'}], optionalServices:[NUS] });
  dev.addEventListener('gattserverdisconnected', gwDown);
  const srv = await (await dev.gatt.connect()).getPrimaryService(NUS);
  const rx = await srv.getCharacteristic(NUS_RX), tx = await srv.getCharacteristic(NUS_TX);
  await tx.startNotifications();
  tx.addEventListener('characteristicvaluechanged', ev => feedBytes(new Uint8Array(ev.target.value.buffer)));
  gw = { sendLine: async s => {                    // ≤20 B chunks (ATT MTU floor)
           const data = new TextEncoder().encode(s + '\n');
           for (let i = 0; i < data.length; i += 20) await rx.writeValueWithoutResponse(data.slice(i, i + 20));
         },
         close: () => dev.gatt.disconnect() };
  gwUp('BLE ' + dev.name);
}

let pollTimer = null;
function gwUp(label) {
  $('gwPill').textContent = label; $('gwPill').className = 'pill ok';
  $('cmd').disabled = $('cmdSend').disabled = false;
  setTimeout(() => gw && gw.sendLine('trace off').catch(()=>{}), 400);
  let tick = 0, rrIdx = 0;
  const statusTries = {};                // id -> status-query attempts (so unreachable nodes aren't polled forever)
  const poll = () => { if (!gw) return;
    gw.sendLine('info').catch(()=>{});   // local query (no airtime): gateway tables + neighbour link quality
    if (tick % 3 === 0) setTimeout(() => gw && gw.sendLine('nbrdump').catch(()=>{}), 1200);   // local
    if (tick % 12 === 0) setTimeout(() => gw && gw.sendLine('rf show').catch(()=>{}), 2400);  // local
    if (tick % 12 === 6) setTimeout(() => gw && gw.sendLine('battdump').catch(()=>{}), 2400); // local
    // STATUS floods the mesh (TTL-bounded query + reply), so poll hard ONLY to fill gaps
    // (name / fw / battery), then back off to a quiet refresh once everything's populated.
    if (tick % 4 === 2) {
      const remotes = [...nodes.keys()].filter(id => id !== gatewayId);
      const gaps = remotes.filter(id => !node(id).fw && (statusTries[id] || 0) < 3);  // never replied — a few tries
      let t = null;
      if (gaps.length) t = gaps[0];                                                // fill fast (~20 s) until populated
      else if (tick % 36 === 2 && remotes.length) t = remotes[rrIdx++ % remotes.length];  // quiet refresh ~every 3 min
      if (t) { statusTries[t] = (statusTries[t] || 0) + 1;
        setTimeout(() => gw && gw.sendLine('status ' + t).catch(()=>{}), 2400); }
    }
    tick++;
  };
  poll(); pollTimer = setInterval(poll, 5000);
}
function gwDown() {
  if (pollTimer) clearInterval(pollTimer); pollTimer = null;
  gw = null; gatewayId = null;
  $('gwPill').textContent = 'no gateway'; $('gwPill').className = 'pill bad';
  $('cmd').disabled = $('cmdSend').disabled = true;
  render();
}

// ---------- console line parser ----------
let nbrsCtx = null;   // current [nbrs]/[status] block source
let statusCtx = false; // true when nbrsCtx came from a [status] reply (has q_tx too)
function onLine(line) {
  const t = line.trim();
  if (!t) return;
  logLine(t);
  const now = Date.now();
  let m;

  if ((m = t.match(/^node ([0-9A-F]{8,64})\s+neighbors=\d+ routes=\d+/i))) {
    gatewayId = m[1].toUpperCase();
    const n = node(gatewayId); n.isGateway = true; n.lastSeen = now; n.routes = [];
    const nm = t.match(/\bname=(.+)$/); if (nm && nm[1].trim()) names[gatewayId] = nm[1].trim();
    nbrsCtx = null; render(); return;
  }
  // Authoritative block list from the gateway (one line per info poll, may be empty).
  if ((m = t.match(/^\[blocked\]((?:\s+[0-9A-F]{8,64})*)\s*$/i))) {
    blocked = new Set((m[1].match(/[0-9A-F]{8,64}/gi) || []).map(s => s.toUpperCase()));
    render(); return;
  }
  if ((m = t.match(/^fw (\S+)/)) && gatewayId) { node(gatewayId).fw = m[1]; return; }
  if ((m = t.match(/^batt .*mv=(\d+) pct=(\d+)/)) && gatewayId) {
    node(gatewayId).batt = { mv:+m[1], pct:+m[2], at:now }; renderDetail(); return;
  }
  if ((m = t.match(/^batt mv=(\d+) pct=(\d+)/)) && gatewayId) {
    node(gatewayId).batt = { mv:+m[1], pct:+m[2], at:now }; return;
  }
  if ((m = t.match(/^batt raw=(\d+) UNCALIBRATED/)) && gatewayId) {
    node(gatewayId).batt = { raw:+m[1], at:now }; renderDetail(); return;
  }
  if ((m = t.match(/^\[rf\].*sf=(\d+).*power_dbm=(-?\d+)/)) && gatewayId) {
    node(gatewayId).sf = +m[1]; node(gatewayId).power = +m[2];
    beaconSec = BEACON_AUTO[+m[1]] || 10; return;
  }
  if ((m = t.match(/^net beacon=(\d+)s/))) { beaconSec = +m[1]; return; }
  // gateway's own nbr lines (info):  nbr ID q_rx=NN q_tx=NN (x100) ... [rssi=R snr=S]
  if ((m = t.match(/^nbr ([0-9A-F]{8,64})\s+q_rx=(-?\d+) q_tx=(-?\d+).*?(?:rssi=(-?\d+) snr=(-?\d+))?$/i))) {
    if (nbrsCtx) {        // inside an [nbrs]/[status] block: SRC hears ID at q_rx
      const src = statusCtx ? 'status' : 'announce';
      node(nbrsCtx).hears[m[1].toUpperCase()] = { q:+m[2]/100, age:0, src, at:now };
      if (statusCtx && +m[3] > 0)   // status replies carry q_tx: ID hears SRC too
        node(m[1].toUpperCase()).hears[nbrsCtx] = Object.assign(node(m[1].toUpperCase()).hears[nbrsCtx]||{}, { q:+m[3]/100, src, at:now });
      node(m[1].toUpperCase()).lastSeen = Math.max(node(m[1].toUpperCase()).lastSeen, now - 1);
    } else if (gatewayId) {
      const other = m[1].toUpperCase(), g = node(gatewayId), o = node(other);
      g.hears[other] = { q:+m[2]/100, rssi:m[4]!==undefined?+m[4]:null,
                         snr:m[5]!==undefined?+m[5]:null, src:'gateway', at:now };
      o.hears[gatewayId] = Object.assign(o.hears[gatewayId]||{},
                         { q:+m[3]/100, src:'gateway-q_tx', at:now });
      o.lastSeen = Math.max(o.lastSeen, now - 1);
    }
    render(); return;
  }
  if ((m = t.match(/^route dst=([0-9A-F]{8,64}) via=([0-9A-F]{8,64}) cost=(-?\d+) hops=(\d+)/i)) && gatewayId) {
    node(gatewayId).routes.push({ dst:m[1].toUpperCase(), via:m[2].toUpperCase(), cost:+m[3]/16, hops:+m[4] });
    return;
  }
  if ((m = t.match(/^\[ctrl\] ack ([0-9A-F]{8,64}) cmd=(\d+) applied=(-?\d+) provisional=(\d)/i))) {
    const origin = m[1].toUpperCase(), applied = +m[3], prov = m[4] === '1';
    const n = node(origin); n.power = applied; n.lastSeen = now;
    ctrlPending.delete(origin+'@');          // ack arrived — cancel the no-ack warning
    logLine(`✓ ${origin} power=${applied} dBm${prov ? ' (provisional — confirming…)' : ' (persisted)'}`);
    if (prov && ctrlPending.get(origin) === applied)
      ctrlSend(2, origin, applied);          // CONFIRM disarms the node's revert
    if (!prov) ctrlPending.delete(origin);
    renderDetail(); return;
  }
  if ((m = t.match(/^\[batt\] ([0-9A-F]{8,64}) mv=(\d+) pct=(\d+) age=(\d+)s/i))) {
    const n = node(m[1].toUpperCase());
    const at = now - (+m[4]) * 1000;
    if (!n.batt || (n.batt.at || 0) <= at) n.batt = { mv:+m[2], pct:+m[3], at };
    return;
  }
  if ((m = t.match(/^\[status\] ([0-9A-F]{8,64}) fw=(\S+) up=(\d+)min sf=(\d+) pwr=(-?\d+) batt=(?:(\d+)mV\/(\d+)%|\?)/i))) {
    const n = node(m[1].toUpperCase());
    n.lastSeen = now; n.fw = m[2]; n.sf = +m[4]; n.power = +m[5];
    if (m[6] !== undefined) n.batt = { mv:+m[6], pct:+m[7], at: now };
    const nm = t.match(/\bname=(.+)$/); if (nm && nm[1].trim()) names[m[1].toUpperCase()] = nm[1].trim();
    nbrsCtx = m[1].toUpperCase();      // following 'nbr ID q_rx=N q_tx=N' lines belong to it
    statusCtx = true;
    render(); return;
  }
  if ((m = t.match(/^\[nbrs\] ([0-9A-F]{8,64}) age=(\d+)s rssi=(-?\d+) snr=(-?\d+)(?: batt=(\d+)%)?/i))) {
    nbrsCtx = m[1].toUpperCase();
    const n = node(nbrsCtx);
    n.lastSeen = Math.max(n.lastSeen, now - (+m[2]) * 1000);
    if (m[5] !== undefined) n.batt = { pct: +m[5], at: now, mv: n.batt?.mv };
    if (gatewayId) {      // the gateway heard this announce directly
      const h = node(gatewayId).hears[nbrsCtx] || {};
      h.rssi = +m[3]; h.snr = +m[4]; h.at = now;
      node(gatewayId).hears[nbrsCtx] = h;
    }
    return;
  }
  if (t.startsWith('[hb]') || t.startsWith('[ble]') || t.startsWith('cad ')) { nbrsCtx = null; statusCtx = false; return; }
}

// ---------- map ----------
const map = L.map('map').setView(DEFAULT_CENTER, ZOOM);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);
const layerLinks = L.layerGroup().addTo(map);
const markers = new Map();
let draggingId = null;   // marker currently being dragged — render() must not reset its position/icon

function freshColor(n) {
  if (!n.lastSeen) return '#777';
  const age = Date.now() - n.lastSeen;
  return age < STALE_MS() ? 'var(--ok)' : age < LOST_MS() ? 'var(--warn)' : 'var(--bad)';
}
function qColor(q) { return q >= 0.9 ? '#3fb950' : q >= 0.6 ? '#d29922' : '#f85149'; }

function markerFor(id) {
  if (markers.has(id)) return markers.get(id);
  const pos = positions[id]; if (!pos) return null;
  const mk = L.marker(pos, { draggable: true, icon: nodeIcon(node(id)) }).addTo(map);
  mk.on('dragstart', () => { draggingId = id; });
  mk.on('dragend', () => { positions[id] = [mk.getLatLng().lat, mk.getLatLng().lng]; draggingId = null; savePos(); render(); });
  mk.on('click', () => select(id));
  markers.set(id, mk);
  return mk;
}
function nodeIcon(n) {
  const battTxt = n.batt && n.batt.pct !== undefined ? `<small>${n.batt.pct}%</small>` : '';
  const gwTxt = n.isGateway ? '<small class="gw">⌂</small>' : '';
  const blk = blocked.has(n.id);
  const blkTxt = blk ? '<small title="blocked by gateway">🚫</small>' : '';
  const border = blk ? 'var(--bad, #c0392b)' : n.isGateway ? 'var(--acc)' : freshColor(n);
  const sel = (selected === n.id) ? ';outline:2px solid var(--acc);outline-offset:2px' : '';
  return L.divIcon({ className: '',
    html: `<div class="nodelabel" style="border-color:${border}${sel}">${esc(nodeName(n.id))}${gwTxt}${blkTxt}${battTxt}</div>`,
    iconAnchor: [30, 13] });
}
function savePos() { localStorage.setItem('agn-node-pos', JSON.stringify(positions)); }

map.on('click', e => {
  if (!placing) return;
  positions[placing] = [e.latlng.lat, e.latlng.lng]; savePos();
  placing = null; $('placeHint').style.display = 'none';
  render();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { placing = null; $('placeHint').style.display = 'none'; select(null); }
});

// Two parallel directional arrows per adjacency, offset perpendicular ~5 px.
function offsetLine(a, b, px) {
  const pa = map.latLngToLayerPoint(a), pb = map.latLngToLayerPoint(b);
  const dx = pb.x - pa.x, dy = pb.y - pa.y, len = Math.hypot(dx, dy) || 1;
  const ox = -dy / len * px, oy = dx / len * px;
  return [map.layerPointToLatLng(L.point(pa.x + ox, pa.y + oy)),
          map.layerPointToLatLng(L.point(pb.x + ox, pb.y + oy))];
}
function arrowAt(a, b, color) {     // small ▶ rotated along the (offset) line at 62%
  const pa = map.latLngToLayerPoint(a), pb = map.latLngToLayerPoint(b);
  const t = 0.62, p = L.point(pa.x + (pb.x - pa.x) * t, pa.y + (pb.y - pa.y) * t);
  const ang = Math.atan2(pb.y - pa.y, pb.x - pa.x) * 180 / Math.PI;
  return L.marker(map.layerPointToLatLng(p), { interactive: false, icon: L.divIcon({ className: '',
    html: `<div style="transform:rotate(${ang}deg);color:${color};font-size:13px;text-shadow:0 0 2px #000">➤</div>`,
    iconAnchor: [6, 9] }) });
}

function drawLinks() {
  layerLinks.clearLayers();
  const done = new Set();
  for (const [bid, b] of nodes) {
    for (const aid of Object.keys(b.hears)) {
      const key = [aid, bid].sort().join('-');
      if (done.has(key)) continue; done.add(key);
      if (!positions[aid] || !positions[bid]) continue;
      const A = positions[aid], B = positions[bid];
      const ab = nodes.get(bid)?.hears[aid];                 // a -> b (b hears a)
      const ba = nodes.get(aid)?.hears[bid];                 // b -> a (a hears b)
      const dim = selected && selected !== aid && selected !== bid;
      const op = dim ? 0.15 : 0.9;
      for (const [dir, dat, from, to] of [['ab', ab, A, B], ['ba', ba, B, A]]) {
        const [f, t] = offsetLine(from, to, 4);
        if (dat && dat.q > 0) {
          const pl = L.polyline([f, t], { color:qColor(dat.q), weight:1+3*dat.q, opacity:op });
          pl.on('click', () => linkPopup(aid, bid, ab, ba, [(A[0]+B[0])/2,(A[1]+B[1])/2]));
          layerLinks.addLayer(pl);
          if (!dim) layerLinks.addLayer(arrowAt(f, t, qColor(dat.q)));
        } else {
          layerLinks.addLayer(L.polyline([f, t], { color:'#666', weight:1, dashArray:'4 6', opacity:op*0.7 }));
        }
      }
      if (ab && ba && ab.q > 0 && ba.q > 0 && Math.abs(ab.q - ba.q) > ASYM_THRESHOLD && !dim) {
        layerLinks.addLayer(L.marker([(A[0]+B[0])/2, (A[1]+B[1])/2], { interactive:false,
          icon: L.divIcon({ className:'', html:'<div class="asym-badge">⚠️</div>', iconAnchor:[8,8] }) }));
      }
    }
  }
  // routes overlay for the selected node: curved blue arrows dst-by-dst
  if (selected && nodes.get(selected)) {
    for (const r of nodes.get(selected).routes || []) {
      if (!positions[selected] || !positions[r.dst]) continue;
      const A = positions[selected], B = positions[r.dst], V = positions[r.via];
      const mid = V && r.via !== r.dst ? V : [(A[0]+B[0])/2 + 0.004, (A[1]+B[1])/2 + 0.004];
      const pl = L.polyline([A, mid, B], { color:'#58a6ff', weight:2, opacity:0.8, dashArray:'1 7' });
      pl.bindTooltip(`→ ${r.dst.slice(-4)} via ${r.via.slice(-4)} cost=${r.cost.toFixed(1)} hops=${r.hops}`);
      layerLinks.addLayer(pl);
    }
  }
}

function snrMargin(snr) {
  const sf = (gatewayId && nodes.get(gatewayId)?.sf) || 7;
  const lim = SNR_LIMIT[sf] ?? -7.5;
  return `${snr - lim >= 0 ? '+' : ''}${(snr - lim).toFixed(1)} dB margin (SF${sf})`;
}
function linkPopup(aid, bid, ab, ba, at) {
  const fmt = (lbl, d) => d && d.q > 0
    ? `${lbl}: q=${d.q.toFixed(2)}${d.rssi != null ? ` rssi=${d.rssi} snr=${d.snr} → ${snrMargin(d.snr)}` : ''} <i>(${d.src})</i>`
    : `${lbl}: unknown`;
  const asym = ab && ba && Math.abs(ab.q - ba.q) > ASYM_THRESHOLD ? '<br><b>⚠ asymmetric link</b>' : '';
  L.popup().setLatLng(at)
    .setContent(`<b>${aid.slice(-4)} ⇄ ${bid.slice(-4)}</b><br>` +
                fmt(`${aid.slice(-4)} → ${bid.slice(-4)}`, ab) + '<br>' +
                fmt(`${bid.slice(-4)} → ${aid.slice(-4)}`, ba) + asym)
    .openOn(map);
}

// ---------- UI ----------
function select(id) { selected = id; render(); }

function render() {
  // node list + placement
  const list = $('nodeList'); list.innerHTML = '';
  for (const [id, n] of [...nodes.entries()].sort()) {
    const row = document.createElement('div');
    row.className = 'node-row' + (selected === id ? ' sel' : '');
    row.innerHTML = `<span class="dot" style="background:${freshColor(n)}"></span>
      <span>${given(id) ? `<b>${esc(given(id))}</b> <span class="mono" style="color:var(--dim);font-size:11px">${shortId(id)}</span>` : `<span class="mono">${id}</span>`}</span>
      ${n.isGateway ? '<span class="pill ok">GW</span>' : ''}
      ${positions[id] ? '' : '<span class="pill">place ▸</span>'}`;
    row.onclick = () => {
      if (!positions[id]) { placing = id; $('placeId').textContent = id; $('placeHint').style.display = 'block'; }
      select(id);
      if (positions[id]) map.panTo(positions[id]);
    };
    list.appendChild(row);
  }
  // markers
  for (const [id] of nodes) {
    const mk = markerFor(id);
    // Don't touch the marker being dragged — setIcon/setLatLng mid-drag yanks it back.
    if (mk && id !== draggingId) { mk.setIcon(nodeIcon(node(id))); mk.setLatLng(positions[id]); }
  }
  drawLinks();
  renderHealth();
  renderDetail();
}

function renderHealth() {
  const rows = [];
  const done = new Set();
  for (const [bid, b] of nodes) for (const aid of Object.keys(b.hears)) {
    const key = [aid, bid].sort().join('-');
    if (done.has(key)) continue; done.add(key);
    const ab = nodes.get(bid)?.hears[aid], ba = nodes.get(aid)?.hears[bid];
    const worst = Math.min(ab?.q ?? 1.01, ba?.q ?? 1.01);
    const asym = ab && ba && Math.abs(ab.q - ba.q) > ASYM_THRESHOLD;
    // best-known RF for the pair (either direction the gateway measured directly)
    const rf = [ab, ba].filter(d => d && d.rssi != null).sort((x, y) => x.snr - y.snr)[0];
    rows.push({ key, aid, bid, worst, asym, oneway: !(ab?.q > 0) || !(ba?.q > 0), rf });
  }
  rows.sort((x, y) => x.worst - y.worst);
  $('healthList').innerHTML = rows.map(r => {
    const rf = r.rf ? ` <span style="color:var(--dim)">${r.rf.rssi}dBm/${r.rf.snr}dB ${marginShort(r.rf.snr)}</span>` : '';
    return `<div class="linkrow" style="color:${qColor(r.worst > 1 ? 1 : r.worst)}">
       ${esc(nodeName(r.aid))} ⇄ ${esc(nodeName(r.bid))} q=${r.worst > 1 ? '?' : r.worst.toFixed(2)}${rf}
       ${r.asym ? ' ⚠asym' : ''}${r.oneway ? ' ⇢one-way' : ''}</div>`;
  }).join('') || '<span class="hint">no links yet</span>';
}
// SNR margin above the SF's demod floor — the honest "how close to dropping" number.
function marginShort(snr) {
  const sf = (gatewayId && nodes.get(gatewayId)?.sf) || 7;
  const m = snr - (SNR_LIMIT[sf] ?? -7.5);
  const c = m >= 10 ? 'var(--ok)' : m >= 5 ? 'var(--warn)' : 'var(--bad)';
  return `<b style="color:${c}">${m >= 0 ? '+' : ''}${m.toFixed(0)}dB</b>`;
}

function renderDetail() {
  const el = $('detail');
  // Don't rebuild the panel out from under the user: if a control inside it has
  // focus (typing a power value, etc.), the periodic refresh would wipe the
  // input. Skip the rebuild while they're interacting; it resumes on blur.
  if (el.contains(document.activeElement) &&
      /^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
  if (!selected || !nodes.has(selected)) { el.innerHTML = '<span class="hint">Click a node on the map or in the list.</span>'; return; }
  const n = nodes.get(selected);
  const isGw = n.isGateway;
  const batt = !n.batt ? '—'
    : n.batt.pct === undefined ? `raw=${n.batt.raw} (uncalibrated)`
    : n.batt.mv !== undefined ? `${n.batt.mv} mV — ${n.batt.pct}%`
    : `${n.batt.pct}% (via beacon — mV arrives with battdump/status)`;
  el.innerHTML = `
    <div style="font-size:16px;font-weight:600">${esc(given(n.id) || shortId(n.id))} ${isGw ? '<span class="pill ok">gateway</span>' : '<span class="pill">remote</span>'}</div>
    <div class="mono" style="font-size:11.5px;color:var(--dim)">${n.id}</div>
    <div class="row" style="display:flex;gap:6px;margin:8px 0">
      <input type="text" id="aliasIn" placeholder="alias (friendly name)" value="${(aliases[n.id]||'').replace(/"/g,'&quot;')}" style="flex:1">
      <button id="aliasSave">Save</button>
    </div>
    <div class="kv" style="margin-top:8px">
      <div>fw</div><div>${n.fw || '—'}</div>
      <div>last seen</div><div>${n.lastSeen ? Math.round((Date.now() - n.lastSeen) / 1000) + ' s ago' : '—'}</div>
      <div>battery</div><div>${batt}</div>
      <div>SF / power</div><div>${n.sf!=null ? 'SF' + n.sf : '—'}${n.power!=null ? ' / ' + n.power + ' dBm' : ''}</div>
      <div>links</div><div>${Object.keys(n.hears).length} inbound known</div>
    </div>
    <h2>Hears (inbound) — RSSI / SNR</h2>
    <div id="hearsList">${Object.entries(n.hears).map(([fid, d]) =>
      `<div class="linkrow" data-nid="${fid}" style="color:${qColor(d.q || 0)}">
         ${esc(nodeName(fid))} &nbsp;q=${(d.q ?? 0).toFixed(2)}${d.rssi != null ? ` &nbsp;<span style="color:var(--dim)">${d.rssi} dBm / ${d.snr} dB SNR ${marginShort(d.snr)}</span>` : ''}
         <i style="color:var(--dim)">(${d.src})</i></div>`).join('')
      || '<span class="hint">nothing heard yet</span>'}</div>
    <h2>Heard by (outbound)</h2>
    <div id="heardByList">${[...nodes.entries()]
      .filter(([oid, o]) => oid !== n.id && o.hears[n.id])
      .map(([oid, o]) => `<div class="linkrow" data-nid="${oid}" style="color:${qColor(o.hears[n.id].q || 0)}">
         ${esc(nodeName(oid))} &nbsp;q=${(o.hears[n.id].q ?? 0).toFixed(2)}</div>`).join('')
      || '<span class="hint">no node reports hearing it yet</span>'}</div>
    ${isGw ? `
    <h2>Battery calibration</h2>
    <div class="hint">Measure the battery with a meter, enter mV:</div>
    <div style="display:flex; gap:6px; margin-top:4px;">
      <input type="number" id="calMv" step="0.01" placeholder="V or mV: 4.02 / 4020">
      <button id="calBtn">batt cal</button>
    </div>
    <div style="margin-top:6px"><button id="battBtn">read batt now</button></div>
    <h2>Controller key</h2>
    <div class="hint">This browser's Ed25519 public key. Provision it on each node
    (<span class="mono">ctrlkey &lt;key&gt;</span>) to enable signed remote control.</div>
    <div class="mono" style="word-break:break-all; font-size:11px; margin:4px 0">${ctrlKeys ? ctrlKeys.pubHex : 'generating…'}</div>
    <button id="provGw">Provision THIS gateway</button>
    <h2>Actions</h2>
    <div class="hint">rf / ble / block via the console box (left). Remote nodes: signed power control on their panel.</div>`
    : `<h2 style="margin-top:12px">Link from gateway ${blocked.has(n.id) ? '<span class="pill" style="background:#c0392b;color:#fff">blocked</span>' : ''}</h2>
       <div class="hint">Block the connected gateway's link to this node. Local + unsigned —
       it applies on the gateway you're connected to (not the remote node), so it's the
       Tier-0 testing hook for forcing a multi-hop path. Authoritative state comes back
       from the gateway's block list.</div>
       <div style="margin-top:6px">
         <button id="blkBtn">${blocked.has(n.id) ? 'Unblock link' : 'Block link'}</button>
       </div>
       <h2 style="margin-top:12px">Remote control (signed)</h2>
       <div class="hint">Requires this browser's controller key provisioned on the node
       (<span class="mono">ctrlkey</span> at install). Power decreases auto-revert in 60 s
       unless confirmed — the map confirms automatically on the ack.</div>
       <div style="display:flex; gap:6px; margin-top:6px; align-items:center;">
         <input type="number" id="pwrSet" min="-9" max="22" value="${n.power ?? ''}" placeholder="${n.power==null?'unknown':''}" style="width:6rem">
         <span class="hint">dBm</span>
         <button id="pwrApply">Set power</button>
       </div>`}
  `;
  const aliasSave = () => {
    const v = el.querySelector('#aliasIn').value.trim();
    if (v) aliases[n.id] = v; else delete aliases[n.id];
    saveAlias(); render();
  };
  el.querySelector('#aliasSave').onclick = aliasSave;
  el.querySelector('#aliasIn').addEventListener('keydown', ev => { if (ev.key === 'Enter') aliasSave(); });
  const blk = el.querySelector('#blkBtn');
  if (blk) blk.onclick = async () => {
    if (!gw) return;
    const willBlock = !blocked.has(n.id);
    await gw.sendLine((willBlock ? 'block ' : 'unblock ') + n.id);
    if (willBlock) blocked.add(n.id); else blocked.delete(n.id);   // optimistic…
    render(); renderDetail();
    setTimeout(() => gw && gw.sendLine('info').catch(()=>{}), 300); // …confirmed by [blocked]
  };
  const pa = el.querySelector('#pwrApply');
  if (pa) pa.onclick = () => {
    const v = Math.max(-9, Math.min(22, +el.querySelector('#pwrSet').value));
    ctrlPending.set(n.id, v);
    ctrlSend(1, n.id, v);
    // Surface silent rejection: a remote node logs accept/reject on ITS console,
    // not the gateway's, so without an ack the operator is blind. If no ack lands
    // in 8 s, warn (almost always: node not provisioned with this controller key,
    // or — pre-fix — a replay-counter desync).
    const askedAt = Date.now(); ctrlPending.set(n.id+'@', askedAt);
    setTimeout(() => {
      if (ctrlPending.get(n.id+'@') === askedAt) {   // still no ack
        logLine('⚠ no ack from '+n.id+' — is it provisioned with this browser’s controller key? (ctrlkey on that node)');
      }
    }, 8000);
  };
  el.querySelectorAll('[data-nid]').forEach(r => r.onclick = () => {
    select(r.dataset.nid);
    if (positions[r.dataset.nid]) map.panTo(positions[r.dataset.nid]);
  });
  if (isGw && $('provGw')) $('provGw').onclick = () =>
    ctrlKeys && gw && gw.sendLine('ctrlkey ' + ctrlKeys.pubHex);
  if (isGw) {
    $('calBtn').onclick = () => { let v = +$('calMv').value; if (v > 0 && v < 10) v = Math.round(v * 1000); if (v >= 1000 && v <= 6000 && gw) gw.sendLine('batt cal ' + v); };
    $('battBtn').onclick = () => gw && gw.sendLine('batt');
  }
}

// ---------- Tier-1 controller (Ed25519 via WebCrypto) ----------
// The private key lives in THIS browser (localStorage, PKCS8) — it IS the
// network's write credential. The pubkey gets provisioned into each node
// (`ctrlkey <hex>`). Commands carry a strictly-increasing counter (replay
// floor, persisted both ends).
const CTRL_DOMAIN = new TextEncoder().encode('AGN-CTRL-1');
let ctrlKeys = null;     // {priv: CryptoKey, pubHex: string}

async function ctrlInit() {
  try {
    const saved = JSON.parse(localStorage.getItem('agn-ctrl-key') || 'null');
    if (saved) {
      const priv = await crypto.subtle.importKey('pkcs8',
        Uint8Array.from(atob(saved.priv), c => c.charCodeAt(0)), {name:'Ed25519'}, true, ['sign']);
      ctrlKeys = { priv, pubHex: saved.pub };
    } else {
      const kp = await crypto.subtle.generateKey({name:'Ed25519'}, true, ['sign','verify']);
      const priv = btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey('pkcs8', kp.privateKey))));
      const pub = [...new Uint8Array(await crypto.subtle.exportKey('raw', kp.publicKey))]
                  .map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
      localStorage.setItem('agn-ctrl-key', JSON.stringify({priv, pub}));
      ctrlKeys = { priv: kp.privateKey, pubHex: pub };
    }
  } catch (e) { logLine('controller crypto unavailable: ' + e); }
}
ctrlInit();

function ctrlNextCounter() {
  // Wall-clock seconds, but strictly greater than the last value we used — so the
  // counter can NEVER desync below a node's replay floor (the bug that silently
  // rejected commands when localStorage reset). u32-safe until 2106.
  const last = parseInt(localStorage.getItem('agn-ctrl-counter') || '0', 10) || 0;
  const c = Math.max(last + 1, Math.floor(Date.now() / 1000));
  localStorage.setItem('agn-ctrl-counter', String(c));
  return c;
}

// Build + sign + flood one command via the gateway. cmd: 1=POWER, 2=CONFIRM.
async function ctrlSend(cmd, targetHex, arg) {
  if (!ctrlKeys || !gw) { logLine('no controller key or gateway'); return null; }
  const counter = ctrlNextCounter();
  const u = new Uint8Array(11);
  u[0] = 1; u[1] = cmd;
  const t = parseInt(targetHex, 16);
  u[2]=t&255; u[3]=(t>>8)&255; u[4]=(t>>16)&255; u[5]=(t>>>24)&255;
  u[6] = arg & 0xFF;
  u[7]=counter&255; u[8]=(counter>>8)&255; u[9]=(counter>>16)&255; u[10]=(counter>>>24)&255;
  const view = new Uint8Array(CTRL_DOMAIN.length + 11);
  view.set(CTRL_DOMAIN); view.set(u, CTRL_DOMAIN.length);
  const sig = new Uint8Array(await crypto.subtle.sign({name:'Ed25519'}, ctrlKeys.priv, view));
  const msg = new Uint8Array(75); msg.set(u); msg.set(sig, 11);
  const hex = [...msg].map(b => b.toString(16).padStart(2,'0')).join('');
  await gw.sendLine('ctrlsend ' + hex);
  logLine(`→ ctrl cmd=${cmd} ${targetHex} arg=${arg} counter=${counter}`);
  logLine(`   key=${ctrlKeys.pubHex}`);   // so it can be checked against the node's stored key
  logLine(`   blob=${hex}`);              // copy this + key to verify the signature host-side
  return counter;
}

// Pending provisional power changes awaiting their ack -> auto-CONFIRM.
const ctrlPending = new Map();   // origin id -> dBm we asked for

// ---------- wire up ----------
$('btnSerial').onclick = () => connectSerial().catch(e => logLine('error: ' + e));
$('btnBle').onclick    = () => connectBle().catch(e => logLine('error: ' + e));
$('cmdSend').onclick   = () => { const v = $('cmd').value.trim(); if (v && gw) { gw.sendLine(v); $('cmd').value = ''; } };
$('cmd').addEventListener('keydown', e => { if (e.key === 'Enter') $('cmdSend').click(); });
// Export the full controller identity, not just positions: the Ed25519 key is the
// network's WRITE CREDENTIAL — without a backup, a cleared browser or dead machine
// means re-provisioning every node by hand. The file therefore contains the PRIVATE
// key; treat it like a password.
$('btnExport').onclick = () => {
  const bundle = {
    _warning: 'CONTAINS THE CONTROLLER PRIVATE KEY — keep this file secret.',
    exported: new Date().toISOString(),
    positions,
    aliases,
    controllerKey: JSON.parse(localStorage.getItem('agn-ctrl-key') || 'null'),
    controllerCounter: localStorage.getItem('agn-ctrl-counter') || '0',
  };
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'agnlora-controller-backup.json'; a.click();
};
$('btnImport').onclick = () => $('impFile').click();
$('impFile').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  const data = JSON.parse(await f.text());
  // Accept both the new bundle and the old positions-only file.
  const pos = data.positions || data;
  Object.assign(positions, pos); savePos();
  if (data.aliases) { Object.assign(aliases, data.aliases); saveAlias(); }
  if (data.controllerKey) {
    if (localStorage.getItem('agn-ctrl-key') &&
        !confirm('Replace this browser’s controller key with the imported one? '
               + 'You manage provisioned nodes with this key — only import a backup of the SAME controller.')) {
      render(); return;
    }
    localStorage.setItem('agn-ctrl-key', JSON.stringify(data.controllerKey));
    if (data.controllerCounter) localStorage.setItem('agn-ctrl-counter', String(data.controllerCounter));
    logLine('controller key imported — reload the page to use it.');
    alert('Controller key imported. Reload the page so the new key takes effect.');
  }
  render();
};
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const d = L.DomUtil.create('div');
  d.style.cssText = 'background:#1a212bd9;border:1px solid #2b3645;border-radius:8px;padding:8px 10px;font:12px system-ui;color:#dfe7f1;line-height:1.7';
  d.innerHTML =
    '<b>Legend</b><br>' +
    '<span style="color:#3fb950">━➤</span> link direction, q ≥ 0.9 ' +
    '(<span style="color:#d29922">amber</span> 0.6–0.9, <span style="color:#f85149">red</span> &lt; 0.6)<br>' +
    '<span style="color:#888">╌ ╌</span> direction not heard (one-way link)<br>' +
    '⚠️ asymmetric (|Δq| &gt; 0.35)<br>' +
    '<span style="color:#58a6ff">·····</span> route of selected node (kink = via relay)<br>' +
    'marker ring: <span style="color:#3fb950">fresh</span> / ' +
    '<span style="color:#d29922">stale</span> / <span style="color:#f85149">lost</span>';
  return d;
};
legend.addTo(map);

map.on('zoomend moveend', drawLinks);
setInterval(render, 5000);          // freshness rings tick even without new data
render();
</script>
</body>
